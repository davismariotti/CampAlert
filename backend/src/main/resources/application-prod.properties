# Email
campfinder.email.provider=postmark
campfinder.email.frontend-base-url=https://campalert.davismariotti.com

# Embedded Tomcat connector threads. Default (200) is sized for concurrency this app's
# user-facing API never sees on the production droplet's single vCPU.
server.tomcat.threads.max=20

# Tomcat's thread-pool metrics (tomcatThreadsBusy/tomcatThreadsConfigMax in New Relic) are
# JMX-based and don't register without this — confirmed live post-deploy that only Tomcat's
# session metrics were being reported, not thread-pool ones, until this is set.
server.tomcat.mbeanregistry.enabled=true

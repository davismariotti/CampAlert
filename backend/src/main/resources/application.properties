# Application Name
spring.application.name=CampAlert

# Reverse proxy / forwarded headers
server.forward-headers-strategy=native

# Graceful shutdown — drain in-flight requests before JVM exit
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# DataSource Configuration
# Configure these in application-local.properties
# spring.datasource.url=
# spring.datasource.username=
# spring.datasource.password=

# Hibernate Configuration
spring.jpa.properties.hibernate.ddl-auto=validate
spring.jpa.properties.jadira.usertype.autoRegisterUserTypes=true
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP
spring.jpa.open-in-view=false

# Recreation API Configuration
recreation.baseUrl=https://www.recreation.gov/api/

# RIDB API Configuration
ridb.baseUrl=https://ridb.recreation.gov/api/v1/
# ridb.apiKey= — configure in application-local.properties or via RIDB_APIKEY env var

# CampLife API Configuration — no auth required
camplife.baseUrl=https://www.camplife.com/api/
# The directory endpoint (`all=true`) returns the entire catalog and has been observed taking >10s;
# other vendors/timeout-types default to 30s (see ProviderHttpClientFactory) if not listed here.
campfinder.http-client.read-timeout.camplife=60s

# CampLife catalog cache — global directory / per-campground / per-site data cached in Redis.
# ttl-days: how long a cached entry is served before a hard refetch.
# stale-after-days: how old a cached directory entry can get before a read triggers an async
# (non-blocking) background refresh in addition to serving the still-cached value.
campfinder.camplife.catalog.ttl-days=60
campfinder.camplife.catalog.stale-after-days=3
# Cadence of the scheduled directory-refresh backstop job — matches the 7-day TTL by default.
campfinder.camplife.catalog.refresh-interval-ms=604800000

# Polling Configuration
campfinder.polling.interval-ms=120000
# Per-provider interval override — a provider with no entry here falls back to interval-ms above.
# Key is the Provider enum name lowercased with underscores replaced by hyphens.
# campfinder.polling.providers.recreation-gov.interval-ms=120000
# Random delay before each tick starts, and before each new (not cache-deduped) Recreation.gov fetch
# within a tick — breaks up the otherwise perfectly regular/bursty request timing.
campfinder.polling.tick-jitter-ms=20000
campfinder.polling.request-jitter-ms=1000
campfinder.checker.thread-pool-queue-capacity=100

# Per-target poll dispatcher — claims due poll_target_state rows and dispatches each target's
# check (campground or permit) onto the shared availabilityCheckerExecutor.
campfinder.polling.dispatcher-interval-ms=5000
# How long a claimed row stays locked before another dispatcher tick/node may reclaim it if the
# check never finished (generous relative to worst-case rate-limiter waits across several sequential
# calls in one target's cycle).
campfinder.polling.claim-lease-ms=180000
# Cleanup job for poll_target_state rows with no active request for longer than this threshold.
campfinder.polling.cleanup-interval-ms=86400000
campfinder.polling.cleanup-threshold-ms=604800000

# Search request limits — global nights cap, plus a per-provider max flexible-range width in days
# (latestStartDay - startDay, i.e. candidate count minus one — independent of nights). A provider with
# no max-range-width-days entry does not support flexible search at all (any latestStartDay for that
# provider is rejected). Key is the Provider enum name lowercased with underscores replaced by hyphens.
campfinder.search.max-nights=21
campfinder.search.providers.recreation-gov.max-range-width-days=30
# CampLife has no per-day availability calendar, so every candidate window in a flexible search costs
# its own API call, fired in parallel (see CampLifeAvailabilityProvider) — 9 means up to 10 candidate
# calls, which comfortably clears the camplife rate limiter (5/s, 15s timeout) below.
campfinder.search.providers.camplife.max-range-width-days=9

# Permit classification/content caching (Redis, keyed by permit id / global for the mapping)
campfinder.permit.mapping-cache-ttl-hours=24
campfinder.permit.content-cache-ttl-hours=2
# Tick-over-tick zone availability baseline (Redis, keyed by permit+division+month) — used to detect
# an implausible partial-to-fully-open reset between polls. A little more than the polling interval
# so one missed tick doesn't lose the baseline.
campfinder.permit.zone-baseline-ttl-minutes=30

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Redis / Session Configuration
spring.session.timeout=30d
spring.session.data.redis.repository-type=indexed
spring.data.redis.repositories.enabled=false
# spring.data.redis.host=      # Configure in application-local.properties or via env
# spring.data.redis.port=
# spring.data.redis.password=

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.recreation-gov.sliding-window-size=10
resilience4j.circuitbreaker.instances.recreation-gov.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.recreation-gov.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.recreation-gov.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.recreation-gov.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.ridb.sliding-window-size=5
resilience4j.circuitbreaker.instances.ridb.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.ridb.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.ridb.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.ridb.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.twilio.sliding-window-size=5
resilience4j.circuitbreaker.instances.twilio.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.twilio.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.twilio.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.twilio.permitted-number-of-calls-in-half-open-state=2
# CampLife's real failure characteristics are unknown (no production traffic history yet), so this
# is not assumed identical to recreation-gov's tuning — sized conservatively and can be adjusted once
# observed.
resilience4j.circuitbreaker.instances.camplife.sliding-window-size=10
resilience4j.circuitbreaker.instances.camplife.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.camplife.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.camplife.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.camplife.permitted-number-of-calls-in-half-open-state=3
# Turnstile is called once per interactive user action (never polled), so volume is much lower than
# the other providers — tuned like ridb, another low-volume integration.
resilience4j.circuitbreaker.instances.turnstile.sliding-window-size=5
resilience4j.circuitbreaker.instances.turnstile.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.turnstile.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.turnstile.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.turnstile.permitted-number-of-calls-in-half-open-state=2

# Resilience4j Retry Configuration
resilience4j.retry.instances.recreation-gov.max-attempts=3
resilience4j.retry.instances.recreation-gov.wait-duration=500ms
resilience4j.retry.instances.recreation-gov.enable-exponential-backoff=true
resilience4j.retry.instances.recreation-gov.exponential-backoff-multiplier=2
resilience4j.retry.instances.recreation-gov.exponential-max-wait-duration=5s
resilience4j.retry.instances.recreation-gov.retry-exceptions=java.io.IOException
resilience4j.retry.instances.recreation-gov.ignore-exceptions=io.github.resilience4j.circuitbreaker.CallNotPermittedException
resilience4j.retry.instances.ridb.max-attempts=3
resilience4j.retry.instances.ridb.wait-duration=500ms
resilience4j.retry.instances.ridb.enable-exponential-backoff=true
resilience4j.retry.instances.ridb.exponential-backoff-multiplier=2
resilience4j.retry.instances.ridb.exponential-max-wait-duration=5s
resilience4j.retry.instances.ridb.retry-exceptions=java.io.IOException
resilience4j.retry.instances.ridb.ignore-exceptions=io.github.resilience4j.circuitbreaker.CallNotPermittedException
resilience4j.retry.instances.camplife.max-attempts=3
resilience4j.retry.instances.camplife.wait-duration=500ms
resilience4j.retry.instances.camplife.enable-exponential-backoff=true
resilience4j.retry.instances.camplife.exponential-backoff-multiplier=2
resilience4j.retry.instances.camplife.exponential-max-wait-duration=5s
resilience4j.retry.instances.camplife.retry-exceptions=java.io.IOException
resilience4j.retry.instances.camplife.ignore-exceptions=io.github.resilience4j.circuitbreaker.CallNotPermittedException
resilience4j.retry.instances.turnstile.max-attempts=3
resilience4j.retry.instances.turnstile.wait-duration=500ms
resilience4j.retry.instances.turnstile.enable-exponential-backoff=true
resilience4j.retry.instances.turnstile.exponential-backoff-multiplier=2
resilience4j.retry.instances.turnstile.exponential-max-wait-duration=5s
resilience4j.retry.instances.turnstile.retry-exceptions=java.io.IOException
resilience4j.retry.instances.turnstile.ignore-exceptions=io.github.resilience4j.circuitbreaker.CallNotPermittedException

# Resilience4j Rate Limiter Configuration — global ceiling shared by campground and permit
# availability calls (both already share the "recreation-gov" circuit breaker/retry above). Sized
# well above this app's real average demand; it's a backstop against pileup (e.g. many poll targets
# due at once after downtime), not a throughput target — see per-campground-polling-scheduler
# design.md for sizing rationale. Applied outermost (gates whether a call attempt starts at all), so
# an acquire timeout here never reaches the retry/circuit-breaker layers below.
resilience4j.ratelimiter.instances.recreation-gov.limit-for-period=5
resilience4j.ratelimiter.instances.recreation-gov.limit-refresh-period=1s
resilience4j.ratelimiter.instances.recreation-gov.timeout-duration=15s
# CampLife previously needed no rate limiter (one call per request), but flexible search now fires
# one call per candidate window in parallel (up to 9, per campfinder.search.providers.camplife above)
# — same ceiling as recreation-gov, for the same reason: protect a third-party API from bursts of our
# own offered load.
resilience4j.ratelimiter.instances.camplife.limit-for-period=5
resilience4j.ratelimiter.instances.camplife.limit-refresh-period=1s
resilience4j.ratelimiter.instances.camplife.timeout-duration=15s

# Notification Outbox Configuration
campfinder.outbox.stale-threshold-minutes=15

# Security Configuration
campfinder.security.remember-me-key=change-me-in-production

# Email provider (mailpit | postmark) — override in application-local.properties or via CAMPFINDER_EMAIL_PROVIDER env var
campfinder.email.provider=mailpit

# Email Configuration
campfinder.email.from-address=campalert@davismariotti.com
campfinder.email.frontend-base-url=http://localhost:5173
campfinder.email.verification.expires-in=10m
campfinder.email.verification.max-attempts=5
campfinder.email.verification.resend-cooldown=60s
campfinder.email.reset.expires-in=15m
campfinder.email.reset.resend-cooldown=60s
campfinder.email.reset.cleanup-retention=7d
campfinder.email.reset.cleanup-schedule=0 0 3 * * *

# Per-IP rate limit backstop on /auth/forgot-password (in addition to the per-account cooldown above)
campfinder.auth.forgot-password.rate-limit-max-requests=10
campfinder.auth.forgot-password.rate-limit-window=1m

# Cloudflare Turnstile bot verification — secret-key has no default here; configure it in
# application-local.properties for dev, or via CAMPFINDER_TURNSTILE_SECRET_KEY in production
campfinder.turnstile.base-url=https://challenges.cloudflare.com/

# Twilio Configuration
# Configure these in application-local.properties
# twilio.account_sid=      # Twilio Console → Account Info
# twilio.auth_token=       # Twilio Console → Account Info
# twilio.messaging_service_sid= # Twilio Console → Messaging → Services → your service → Service SID
# twilio.verify_service_sid= # Twilio Console → Verify → Services → your service → Service SID
# (twilio.verify_service_sid and twilio.account_sid/auth_token above also back TwilioVerifyService
# and TwilioHealthIndicator directly, via TwilioConfiguration's Twilio.init — unrelated to sending.)

# Notifications library (com.davismariotti:notifications-*) — per-channel providers.
# Aliased to the existing twilio.*/campfinder.email.* properties above so no separate secrets or
# local-file changes are needed; the library itself never reads these properties or env directly.
notifications.sms.provider=twilio
notifications.sms.twilio.account-sid=${twilio.account_sid:}
notifications.sms.twilio.auth-token=${twilio.auth_token:}
notifications.sms.twilio.messaging-service-sid=${twilio.messaging_service_sid:}

notifications.email.provider=${campfinder.email.provider:mailpit}
notifications.email.from-address=${campfinder.email.from-address:}
notifications.email.postmark.server-token=${campfinder.email.postmark.server-token:}

# No credentials needed here — Pushover creds travel per-recipient (see RecipientResolver).
notifications.push.provider=pushover

# Disabled: the starter's resilience decorator resolves CircuitBreakerRegistry/RetryRegistry via
# ObjectProvider.getObject(), which throws NoUniqueBeanDefinitionException because CampAlert already
# has its own beans of both types (used by ridb/recreation-gov circuit breakers). Tracked as a
# notifications-java library bug to fix (e.g. self-contained registries or getIfAvailable); until
# fixed, CampAlert sends without the library's circuit-breaker/retry wrapping around senders.
notifications.resilience.enabled=false

# Micrometer -> New Relic export (Spring Boot's built-in NewRelicMetricsExportAutoConfiguration,
# active now that io.micrometer:micrometer-registry-new-relic is on the classpath). Routes through
# the already-attached New Relic Java agent instead of the default insights-api client provider, so
# no separate api-key/account-id is needed — this is what actually gets notifications-java's
# NotificationMetrics (notifications.send Timer/Counter) exported to NRDB; see MetricsInterceptor for
# the separate mechanism used by Recreation.gov/RIDB/CampLife/Turnstile's HTTP call timing.
# event-type is required: Spring Boot's own NewRelicProperties defaults it to "SpringBootSample",
# not Micrometer's library default of "MicrometerSample" — every NRQL query in the dashboard
# (terraform/modules/campalert/dashboard.tf in the infra repo) queries FROM MicrometerSample, so
# without this override the data silently lands under a name nothing looks for.
management.newrelic.metrics.export.client-provider-type=insights-agent
management.newrelic.metrics.export.event-type=MicrometerSample

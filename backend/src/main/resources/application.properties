# Application Name
spring.application.name=CampAlert

# Reverse proxy / forwarded headers
server.forward-headers-strategy=native

# Graceful shutdown — drain in-flight requests before JVM exit
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# DataSource Configuration
# Configure these in application-local.properties
# spring.datasource.url=
# spring.datasource.username=
# spring.datasource.password=

# Hibernate Configuration
spring.jpa.properties.hibernate.ddl-auto=validate
spring.jpa.properties.jadira.usertype.autoRegisterUserTypes=true
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP
spring.jpa.open-in-view=false

# Recreation API Configuration
recreation.baseUrl=https://www.recreation.gov/api/

# RIDB API Configuration
ridb.baseUrl=https://ridb.recreation.gov/api/v1/
# ridb.apiKey= — configure in application-local.properties or via RIDB_APIKEY env var

# Polling Configuration
campfinder.polling.interval-ms=120000
# Random delay before each tick starts, and before each new (not cache-deduped) Recreation.gov fetch
# within a tick — breaks up the otherwise perfectly regular/bursty request timing.
campfinder.polling.tick-jitter-ms=20000
campfinder.polling.request-jitter-ms=1000
campfinder.checker.thread-pool-queue-capacity=100

# Permit classification/content caching (Redis, keyed by permit id / global for the mapping)
campfinder.permit.mapping-cache-ttl-hours=24
campfinder.permit.content-cache-ttl-hours=2
# Tick-over-tick zone availability baseline (Redis, keyed by permit+division+month) — used to detect
# an implausible partial-to-fully-open reset between polls. A little more than the polling interval
# so one missed tick doesn't lose the baseline.
campfinder.permit.zone-baseline-ttl-minutes=30

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Redis / Session Configuration
spring.session.timeout=30d
spring.session.data.redis.repository-type=indexed
spring.data.redis.repositories.enabled=false
# spring.data.redis.host=      # Configure in application-local.properties or via env
# spring.data.redis.port=
# spring.data.redis.password=

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.recreation-gov.sliding-window-size=10
resilience4j.circuitbreaker.instances.recreation-gov.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.recreation-gov.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.recreation-gov.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.recreation-gov.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.ridb.sliding-window-size=5
resilience4j.circuitbreaker.instances.ridb.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.ridb.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.ridb.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.ridb.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.twilio.sliding-window-size=5
resilience4j.circuitbreaker.instances.twilio.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.twilio.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.twilio.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.twilio.permitted-number-of-calls-in-half-open-state=2

# Resilience4j Retry Configuration
resilience4j.retry.instances.recreation-gov.max-attempts=3
resilience4j.retry.instances.recreation-gov.wait-duration=500ms
resilience4j.retry.instances.recreation-gov.enable-exponential-backoff=true
resilience4j.retry.instances.recreation-gov.exponential-backoff-multiplier=2
resilience4j.retry.instances.recreation-gov.exponential-max-wait-duration=5s
resilience4j.retry.instances.recreation-gov.retry-exceptions=java.io.IOException
resilience4j.retry.instances.recreation-gov.ignore-exceptions=io.github.resilience4j.circuitbreaker.CallNotPermittedException
resilience4j.retry.instances.ridb.max-attempts=3
resilience4j.retry.instances.ridb.wait-duration=500ms
resilience4j.retry.instances.ridb.enable-exponential-backoff=true
resilience4j.retry.instances.ridb.exponential-backoff-multiplier=2
resilience4j.retry.instances.ridb.exponential-max-wait-duration=5s
resilience4j.retry.instances.ridb.retry-exceptions=java.io.IOException
resilience4j.retry.instances.ridb.ignore-exceptions=io.github.resilience4j.circuitbreaker.CallNotPermittedException

# Notification Outbox Configuration
campfinder.outbox.stale-threshold-minutes=15

# Security Configuration
campfinder.security.remember-me-key=change-me-in-production

# Email provider (mailpit | postmark) — override in application-local.properties or via CAMPFINDER_EMAIL_PROVIDER env var
campfinder.email.provider=mailpit

# Email Configuration
campfinder.email.from-address=campalert@davismariotti.com
campfinder.email.frontend-base-url=http://localhost:5173
campfinder.email.verification.expires-in=10m
campfinder.email.verification.max-attempts=5
campfinder.email.verification.resend-cooldown=60s
campfinder.email.reset.expires-in=15m
campfinder.email.reset.resend-cooldown=60s
campfinder.email.reset.cleanup-retention=7d
campfinder.email.reset.cleanup-schedule=0 0 3 * * *

# Per-IP rate limit backstop on /auth/forgot-password (in addition to the per-account cooldown above)
campfinder.auth.forgot-password.rate-limit-max-requests=10
campfinder.auth.forgot-password.rate-limit-window=1m

# Twilio Configuration
# Configure these in application-local.properties
# twilio.account_sid=      # Twilio Console → Account Info
# twilio.auth_token=       # Twilio Console → Account Info
# twilio.messaging_service_sid= # Twilio Console → Messaging → Services → your service → Service SID
# twilio.verify_service_sid= # Twilio Console → Verify → Services → your service → Service SID
# (twilio.verify_service_sid and twilio.account_sid/auth_token above also back TwilioVerifyService
# and TwilioHealthIndicator directly, via TwilioConfiguration's Twilio.init — unrelated to sending.)

# Notifications library (com.davismariotti:notifications-*) — per-channel providers.
# Aliased to the existing twilio.*/campfinder.email.* properties above so no separate secrets or
# local-file changes are needed; the library itself never reads these properties or env directly.
notifications.sms.provider=twilio
notifications.sms.twilio.account-sid=${twilio.account_sid:}
notifications.sms.twilio.auth-token=${twilio.auth_token:}
notifications.sms.twilio.messaging-service-sid=${twilio.messaging_service_sid:}

notifications.email.provider=${campfinder.email.provider:mailpit}
notifications.email.from-address=${campfinder.email.from-address:}
notifications.email.postmark.server-token=${campfinder.email.postmark.server-token:}

# No credentials needed here — Pushover creds travel per-recipient (see RecipientResolver).
notifications.push.provider=pushover

# Disabled: the starter's resilience decorator resolves CircuitBreakerRegistry/RetryRegistry via
# ObjectProvider.getObject(), which throws NoUniqueBeanDefinitionException because CampAlert already
# has its own beans of both types (used by ridb/recreation-gov circuit breakers). Tracked as a
# notifications-java library bug to fix (e.g. self-contained registries or getIfAvailable); until
# fixed, CampAlert sends without the library's circuit-breaker/retry wrapping around senders.
notifications.resilience.enabled=false

# Application Name
spring.application.name=CampAlert

# DataSource Configuration
# Configure these in application-local.properties
# spring.datasource.url=
# spring.datasource.username=
# spring.datasource.password=

# Hibernate Configuration
spring.jpa.properties.hibernate.ddl-auto=validate
spring.jpa.properties.jadira.usertype.autoRegisterUserTypes=true
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP
spring.jpa.open-in-view=false

# Recreation API Configuration
# Configure this in application-local.properties
# recreation.baseUrl=

# Polling Configuration
campfinder.polling.interval-ms=120000

# Actuator Configuration
management.endpoints.web.exposure.include=health,info

# Twilio Configuration
# Configure these in application-local.properties
# twilio.account_sid=      # Twilio Console → Account Info
# twilio.auth_token=       # Twilio Console → Account Info
# twilio.from_number=      # Twilio Console → Phone Numbers → Active Numbers (E.164)
# twilio.verify_service_sid= # Twilio Console → Verify → Services → your service → Service SID

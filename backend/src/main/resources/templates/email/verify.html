<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"
      th:replace="~{email/layout :: shell(~{::title}, ~{::div#email-body})}">
<head>
  <title>Verify your CampAlert email</title>
</head>
<body>
<div id="email-body">
  <h2 style="margin: 0 0 8px 0; color: #1a3d2e; font-size: 20px; font-weight: 700;">Verify your email address</h2>
  <p style="margin: 0 0 24px 0; color: #374151; font-size: 15px; line-height: 1.5;">
    Enter this code to complete your CampAlert registration:
  </p>
  <div th:text="${code}" style="font-size: 40px; font-weight: 800; letter-spacing: 10px; color: #1a3d2e; text-align: center; margin: 24px 0; padding: 16px; background-color: #f5f5f0; border-radius: 6px;">
    000000
  </div>
  <p style="margin: 0 0 20px 0; color: #374151; font-size: 14px; line-height: 1.5;">Or open the verification page directly:</p>
  <div style="text-align: center; margin-bottom: 24px;">
    <a th:href="${verifyUrl}"
       href="#"
       style="display: inline-block; padding: 12px 28px; background-color: #f59e0b; color: #1a3d2e; text-decoration: none; border-radius: 6px; font-size: 14px; font-weight: 700; letter-spacing: 0.2px;">
      Open verification page
    </a>
  </div>
  <p style="margin: 0; color: #6b7280; font-size: 12px; line-height: 1.5;">
    This code expires in <span th:text="${expiryMinutes}">10</span> minutes.
    If you did not create a CampAlert account, you can safely ignore this email.
  </p>
</div>
</body>
</html>

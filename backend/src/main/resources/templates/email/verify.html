<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify your email</title>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 480px; margin: 40px auto; background: #ffffff; border-radius: 8px; padding: 40px; }
    .code { font-size: 36px; font-weight: bold; letter-spacing: 8px; color: #1a1a1a; text-align: center; margin: 24px 0; }
    .btn { display: block; width: fit-content; margin: 0 auto; padding: 12px 24px; background: #2563eb; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 14px; }
    .footer { color: #6b7280; font-size: 12px; margin-top: 32px; }
  </style>
</head>
<body>
<div class="container">
  <h2>Verify your CampAlert email</h2>
  <p>Enter this code to complete your registration:</p>
  <div class="code" th:text="${code}">000000</div>
  <p>Or open the verification page directly:</p>
  <a class="btn" th:href="${verifyUrl}">Open verification page</a>
  <div class="footer">
    <p>This code expires in <span th:text="${expiryMinutes}">10</span> minutes. If you did not create a CampAlert account, you can ignore this email.</p>
  </div>
</div>
</body>
</html>

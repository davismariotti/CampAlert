<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"
      th:replace="~{email/layout :: shell(~{::title}, ~{::div#email-body})}">
<head>
  <title>Reset your CampAlert password</title>
</head>
<body>
<div id="email-body">
  <h2 style="margin: 0 0 8px 0; color: #1a3d2e; font-size: 20px; font-weight: 700;">Reset your password</h2>
  <p style="margin: 0 0 24px 0; color: #374151; font-size: 15px; line-height: 1.5;">
    Click the button below to choose a new password. This link can only be used once.
  </p>
  <div style="text-align: center; margin-bottom: 24px;">
    <a th:href="${resetUrl}"
       href="#"
       style="display: inline-block; padding: 12px 28px; background-color: #f59e0b; color: #1a3d2e; text-decoration: none; border-radius: 6px; font-size: 14px; font-weight: 700; letter-spacing: 0.2px;">
      Reset password
    </a>
  </div>
  <p style="margin: 0; color: #6b7280; font-size: 12px; line-height: 1.5;">
    This link expires in <span th:text="${expiryMinutes}">15</span> minutes.
    If you did not request a password reset, you can ignore this email — your password has not changed.
  </p>
</div>
</body>
</html>

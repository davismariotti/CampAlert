<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset your password</title>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 480px; margin: 40px auto; background: #ffffff; border-radius: 8px; padding: 40px; }
    .btn { display: block; width: fit-content; margin: 24px auto; padding: 12px 24px; background: #2563eb; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 14px; }
    .footer { color: #6b7280; font-size: 12px; margin-top: 32px; }
  </style>
</head>
<body>
<div class="container">
  <h2>Reset your CampAlert password</h2>
  <p>Click the button below to choose a new password. This link can only be used once.</p>
  <a class="btn" th:href="${resetUrl}">Reset password</a>
  <div class="footer">
    <p>This link expires in <span th:text="${expiryMinutes}">15</span> minutes. If you did not request a password reset, you can ignore this email — your password has not changed.</p>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"
      th:replace="~{email/layout :: shell(~{::title}, ~{::div#email-body})}">
<head>
  <title>Your CampAlert password was changed</title>
</head>
<body>
<div id="email-body">
  <h2 style="margin: 0 0 8px 0; color: #1a3d2e; font-size: 20px; font-weight: 700;">Your password was changed</h2>
  <p style="margin: 0 0 24px 0; color: #374151; font-size: 15px; line-height: 1.5;">
    The password on your CampAlert account was just changed. All other sessions and any "remember me" logins
    have been signed out.
  </p>
  <p style="margin: 0; color: #6b7280; font-size: 12px; line-height: 1.5;">
    If you did not make this change, someone else may have access to your account — reset your password
    immediately from the sign-in page.
  </p>
</div>
</body>
</html>

# Stub external service credentials so the context loads without local.properties
twilio.account_sid=ACtest00000000000000000000000000000
twilio.auth_token=test_auth_token_00000000000000000
twilio.messaging_service_sid=MGtest0000000000000000000000000000
twilio.verify_service_sid=VAtest00000000000000000000000000000
recreation.baseUrl=http://localhost:19999/
ridb.baseUrl=http://localhost:19999/
ridb.apiKey=test_api_key
campfinder.security.remember-me-key=integration-test-remember-me-key

# Push polling interval far out so the scheduler doesn't fire during tests
campfinder.polling.interval-ms=3600000
# Safety-net dispatcher interval far out so it doesn't fire during tests
campfinder.notification.safety-net-ms=3600000

# Tight forgot-password rate limit + short window so limit-exceeded/reset-after-window tests run fast
campfinder.auth.forgot-password.rate-limit-max-requests=3
campfinder.auth.forgot-password.rate-limit-window=1s

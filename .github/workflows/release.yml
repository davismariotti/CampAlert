name: Release

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.releaserc.json'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build Docker image without pushing, skip release'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new-release-published: ${{ steps.release-check.outputs.new_release_published }}
      new-release-version: ${{ steps.release-check.outputs.new_release_version }}
      branches-config: ${{ steps.branches.outputs.config }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect open PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr view --json number -q '.number' 2>/dev/null || echo "")
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
      - name: Build branches config
        id: branches
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REF_NAME: ${{ github.ref_name }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          if [ -n "$PR_NUMBER" ]; then
            echo "config=[\"main\", {\"name\": \"${REF_NAME}\", \"channel\": \"next\", \"prerelease\": \"pr-${PR_NUMBER}.${RUN_NUMBER}.${RUN_ATTEMPT}\"}]" >> "$GITHUB_OUTPUT"
          else
            echo 'config=["main"]' >> "$GITHUB_OUTPUT"
          fi
      - id: release-check
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
          branches: ${{ steps.branches.outputs.config }}
          extra_plugins: |
            @semantic-release/exec@6
            @semantic-release/git@10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-docker:
    needs: release-check
    if: needs.release-check.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - if: inputs.dry_run != true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: davismariotti/campalert
          tags: |
            type=raw,value=${{ needs.release-check.outputs.new-release-version }}
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64,linux/arm64
          push: ${{ inputs.dry_run != true }}
          build-args: VERSION=${{ needs.release-check.outputs.new-release-version }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [release-check, build-and-push-docker]
    if: needs.release-check.outputs.new-release-published == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cycjimmy/semantic-release-action@v4
        with:
          branches: ${{ needs.release-check.outputs.branches-config }}
          extra_plugins: |
            @semantic-release/exec@6
            @semantic-release/git@10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

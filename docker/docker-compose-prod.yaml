name: campalert

services:
  app:
    image: davismariotti/campalert:latest
    restart: unless-stopped
    profiles: [app]
    env_file: .env.prod
    environment:
      SPRING_DATA_REDIS_HOST: redis
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - proxy
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.campalert.rule=Host(`campalert-api.davismariotti.com`)"
      - "traefik.http.routers.campalert.entrypoints=web"
      - "traefik.http.routers.campalert.middlewares=campalert-proto"
      - "traefik.http.middlewares.campalert-proto.headers.customRequestHeaders.X-Forwarded-Proto=https"
      - "traefik.http.services.campalert.loadbalancer.server.port=8080"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${SPRING_DATA_REDIS_PASSWORD}
    volumes:
      - ../data/redis:/data
    networks:
      - db

  # Ephemeral dev-db used only by Atlas during migrations — no persistent volume.
  atlas-dev-db:
    image: postgres:16-alpine
    network_mode: host
    profiles: [migrate]
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: dev
      PGPORT: "5433"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d dev -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: arigaio/atlas
    network_mode: host
    profiles: [migrate]
    depends_on:
      atlas-dev-db:
        condition: service_healthy
    volumes:
      - ../backend/db:/db
    command: >
      schema apply
      --url "postgres://${DB_USERNAME}:${DB_PASSWORD}@localhost:5432/campalert?sslmode=disable"
      --to "file:///db/schema.sql"
      --dev-url "postgres://dev:dev@localhost:5433/dev?sslmode=disable"
      --config file:///db/atlas.hcl
      --auto-approve

networks:
  proxy:
    external: true
  db:
    external: true
    name: services_backend

openapi: "3.0.3"

info:
  title: CampAlert API
  version: "1.1.0"

servers:
  - url: /api

tags:
  - name: Auth
  - name: Campgrounds
  - name: SearchRequests
  - name: PhoneNumbers

paths:
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBody'
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Log in and establish a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginBody'
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Invalidate the current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Get the current authenticated user
      responses:
        "200":
          description: Current user identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Auth]
      operationId: updateMe
      summary: Update current user settings (e.g. timezone)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeBody'
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /campground-search:
    get:
      tags: [Campgrounds]
      operationId: searchCampgrounds
      summary: Search campgrounds by name
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of matching campgrounds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CampgroundSearchResult'
        "400":
          description: Missing or blank query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Recreation.gov upstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /campgrounds/{id}:
    get:
      tags: [Campgrounds]
      operationId: getCampground
      summary: Get campground availability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campground availability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampgroundResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Campground not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Recreation.gov upstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /campgrounds/{id}/loops:
    get:
      tags: [Campgrounds]
      operationId: getCampgroundLoops
      summary: Get distinct loop names for a campground
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sorted list of loops with access type metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoopInfo'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: RIDB upstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /search-requests:
    get:
      tags: [SearchRequests]
      operationId: listSearchRequests
      summary: List all search requests
      parameters:
        - name: completed
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of search requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchRequestResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [SearchRequests]
      operationId: createSearchRequest
      summary: Create a new search request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSearchRequestBody'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchRequestResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: No verified phone number on account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /search-requests/{id}:
    get:
      tags: [SearchRequests]
      operationId: getSearchRequest
      summary: Get a search request by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Search request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchRequestResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [SearchRequests]
      operationId: updateSearchRequest
      summary: Update a search request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSearchRequestBody'
      responses:
        "200":
          description: Updated search request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchRequestResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [SearchRequests]
      operationId: deleteSearchRequest
      summary: Delete a search request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /phone-numbers:
    get:
      tags: [PhoneNumbers]
      operationId: listPhoneNumbers
      summary: List the authenticated user's phone numbers
      responses:
        "200":
          description: List of phone numbers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PhoneNumberResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [PhoneNumbers]
      operationId: addPhoneNumber
      summary: Add a phone number and send a verification OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPhoneNumberBody'
      responses:
        "201":
          description: Phone number created and OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Phone number already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Twilio Verify error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /phone-numbers/{id}/verify:
    post:
      tags: [PhoneNumbers]
      operationId: verifyPhoneNumber
      summary: Confirm the OTP code for a pending phone number
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyPhoneNumberBody'
      responses:
        "200":
          description: Phone number verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Phone number not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Invalid or expired OTP, or number not in pending state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /phone-numbers/{id}:
    delete:
      tags: [PhoneNumbers]
      operationId: deletePhoneNumber
      summary: Delete a phone number
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    AuthResponse:
      type: object
      required:
        - id
        - email
        - timezone
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        timezone:
          type: string

    RegisterBody:
      type: object
      required:
        - email
        - password
        - timezone
      properties:
        email:
          type: string
        password:
          type: string
        timezone:
          type: string

    LoginBody:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string

    CampgroundResponse:
      type: object
      required:
        - campsites
      properties:
        campsites:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CampsiteResponse'

    CampsiteResponse:
      type: object
      required:
        - campsiteId
        - site
        - loop
        - campsiteReserveType
        - minimumNumberOfPeople
        - maximumNumberOfPeople
        - availabilities
        - quantities
      properties:
        campsiteId:
          type: integer
        site:
          type: string
        loop:
          type: string
        campsiteReserveType:
          type: string
        minimumNumberOfPeople:
          type: integer
        maximumNumberOfPeople:
          type: integer
        availabilities:
          type: object
          additionalProperties:
            type: string
          description: Map of ISO-8601 date-time string to availability status
        quantities:
          type: object
          additionalProperties:
            type: integer
          description: Map of ISO-8601 date-time string to quantity

    SearchRequestResponse:
      type: object
      required:
        - id
        - startDay
        - nights
        - groupSize
        - campsiteId
        - name
        - completed
        - campgroundName
        - stats
      properties:
        id:
          type: integer
        startDay:
          type: string
          format: date
        nights:
          type: integer
          minimum: 1
        groupSize:
          type: integer
          minimum: 1
        campsiteId:
          type: integer
        campgroundName:
          type: string
        loops:
          type: array
          items:
            type: string
          nullable: true
        name:
          type: string
        completed:
          type: boolean
        pauseReason:
          type: string
          nullable: true
        stats:
          $ref: '#/components/schemas/SearchRequestStats'

    SearchRequestStats:
      type: object
      required:
        - totalChecks
        - availableChecks
        - avgAvailabilityWindowMinutes
        - missedQuietHoursWindows
      properties:
        totalChecks:
          type: integer
          format: int64
        availableChecks:
          type: integer
          format: int64
        availabilityRate:
          type: number
          format: double
          nullable: true
        avgAvailabilityWindowMinutes:
          type: number
          format: double
        missedQuietHoursWindows:
          type: integer
          format: int64

    UpdateMeBody:
      type: object
      properties:
        timezone:
          type: string

    CreateSearchRequestBody:
      type: object
      required:
        - startDay
        - nights
        - groupSize
        - campsiteId
        - name
        - campgroundName
      properties:
        startDay:
          type: string
          format: date
        nights:
          type: integer
          minimum: 1
        groupSize:
          type: integer
          minimum: 1
        campsiteId:
          type: integer
        campgroundName:
          type: string
        loops:
          type: array
          items:
            type: string
          nullable: true
        name:
          type: string

    LoopInfo:
      type: object
      required:
        - name
        - boatInOnly
      properties:
        name:
          type: string
        boatInOnly:
          type: boolean

    UpdateSearchRequestBody:
      type: object
      required:
        - startDay
        - nights
        - groupSize
        - campsiteId
        - name
        - completed
      properties:
        startDay:
          type: string
          format: date
        nights:
          type: integer
          minimum: 1
        groupSize:
          type: integer
          minimum: 1
        campsiteId:
          type: integer
        loops:
          type: array
          items:
            type: string
          nullable: true
        name:
          type: string
        completed:
          type: boolean

    CampgroundSearchResult:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        details:
          type: string
        code:
          type: string

    PhoneNumberResponse:
      type: object
      required:
        - id
        - phone
        - status
        - smsConsentAt
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        phone:
          type: string
        status:
          type: string
          enum: [PENDING_VERIFICATION, VERIFIED, OPTED_OUT]
        firstMessageSent:
          type: boolean
        smsConsentAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        verifiedAt:
          type: string
          format: date-time
          nullable: true
        requiresCarrierOptIn:
          type: boolean

    AddPhoneNumberBody:
      type: object
      required:
        - phone
        - smsConsent
      properties:
        phone:
          type: string
          description: E.164 format (e.g. +12125551234)
        smsConsent:
          type: boolean
          description: Must be true; user has agreed to receive SMS

    VerifyPhoneNumberBody:
      type: object
      required:
        - code
      properties:
        code:
          type: string

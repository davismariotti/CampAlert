    PermitDivision:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        district:
          type: string
          nullable: true
          description: Named sub-region grouping used to browse large division lists (e.g. Yellowstone's "Old Faithful"). Not a hierarchy — a division's childDivisionIds may belong to a different district.
        maxGroupSize:
          type: integer
          nullable: true
          description: This division's own MaxGroupSize rule value, when Recreation.gov scopes the rule per-division (typically ITINERARY permits). Null when not present.
        childDivisionIds:
          type: array
          items:
            type: string
          nullable: true
          description: Legal next-night division ids; populated only for ITINERARY permits.


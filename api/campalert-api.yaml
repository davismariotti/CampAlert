openapi: "3.0.3"

info:
  title: CampAlert API
  version: "1.3.0"

servers:
  - url: /api

tags:
  - name: Auth
  - name: Campgrounds
  - name: SearchRequests
  - name: Permits
  - name: PermitSearchRequests
  - name: PhoneNumbers

paths:
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterBody'
      responses:
        "201":
          description: Account created; email verification required before login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/resend-verification:
    post:
      tags: [Auth]
      operationId: resendVerification
      summary: Resend email verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationBody'
      responses:
        "202":
          description: Accepted (same response regardless of account state)

  /auth/verify-email:
    post:
      tags: [Auth]
      operationId: verifyEmail
      summary: Verify email address with a one-time code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailBody'
      responses:
        "200":
          description: Email verified — session established, returns authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "422":
          description: Invalid code, expired, or attempt limit reached (code field contains VERIFICATION_CODE_INVALID, VERIFICATION_CODE_ATTEMPTS_EXCEEDED, or VERIFICATION_INVALID_OR_EXPIRED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordBody'
      responses:
        "202":
          description: Accepted (same response regardless of account state or delivery outcome)
        "429":
          description: Too many requests from this client, try again later
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Consume a password reset token and set a new password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordBody'
      responses:
        "204":
          description: Password reset successfully
        "422":
          description: Invalid or expired token, or new password rejected (code field contains RESET_INVALID_OR_EXPIRED, RESET_PASSWORD_TOO_WEAK, or RESET_PASSWORD_SAME_AS_CURRENT)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Log in and establish a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginBody'
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Invalidate the current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      tags: [Auth]
      operationId: getMe
      summary: Get the current authenticated user
      responses:
        "200":
          description: Current user identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Auth]
      operationId: updateMe
      summary: Update current user settings (e.g. timezone)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeBody'
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me/password:
    put:
      tags: [Auth]
      operationId: changePassword
      summary: Change the authenticated user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordBody'
      responses:
        "204":
          description: Password changed successfully
        "400":
          description: Current password incorrect, new password same as current, or validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: CSRF token missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /campground-search:
    get:
      tags: [Campgrounds]
      operationId: searchCampgrounds
      summary: Search campgrounds by name
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of matching campgrounds
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CampgroundSearchResult'
        "400":
          description: Missing or blank query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Recreation.gov upstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /campgrounds/{id}:
    get:
      tags: [Campgrounds]
      operationId: getCampground
      summary: Get campground availability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campground availability
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampgroundResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Campground not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Recreation.gov upstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /campgrounds/{id}/loops:
    get:
      tags: [Campgrounds]
      operationId: getCampgroundLoops
      summary: Get distinct loop names for a campground
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sorted list of loops with access type metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoopInfo'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: RIDB upstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /search-requests:
    get:
      tags: [SearchRequests]
      operationId: listSearchRequests
      summary: List all search requests
      parameters:
        - name: completed
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of search requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchRequestResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [SearchRequests]
      operationId: createSearchRequest
      summary: Create a new search request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSearchRequestBody'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchRequestResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: No verified phone number on account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /search-requests/{id}:
    get:
      tags: [SearchRequests]
      operationId: getSearchRequest
      summary: Get a search request by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Search request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchRequestResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [SearchRequests]
      operationId: updateSearchRequest
      summary: Update a search request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSearchRequestBody'
      responses:
        "200":
          description: Updated search request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchRequestResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [SearchRequests]
      operationId: deleteSearchRequest
      summary: Delete a search request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /permit-search:
    get:
      tags: [Permits]
      operationId: searchPermits
      summary: Search Recreation.gov permits by name
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of matching permits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PermitSearchResult'
        "400":
          description: Missing or blank query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Recreation.gov upstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /permits/{id}:
    get:
      tags: [Permits]
      operationId: getPermit
      summary: Get a supported permit's divisions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Permit detail with divisions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermitResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Permit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Permit reservation mechanism is not supported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Recreation.gov upstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /permits/{id}/availability:
    get:
      tags: [Permits]
      operationId: getPermitAvailability
      summary: Get a zone permit's month availability across all divisions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Zone permit availability grid for the month containing startDate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermitZoneAvailabilityPreviewResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Permit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Permit reservation mechanism is not supported, or is not a zone permit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Recreation.gov upstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /permits/{id}/divisions/{divisionId}/availability:
    get:
      tags: [Permits]
      operationId: getPermitDivisionAvailability
      summary: Get an itinerary permit division's month availability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: divisionId
          in: path
          required: true
          schema:
            type: string
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
        - name: year
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Itinerary division availability for the given month
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermitDivisionAvailabilityPreviewResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Permit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Permit reservation mechanism is not supported, or is not an itinerary permit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Recreation.gov upstream error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /permit-search-requests:
    get:
      tags: [PermitSearchRequests]
      operationId: listPermitSearchRequests
      summary: List all permit search requests
      parameters:
        - name: completed
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of permit search requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PermitSearchRequestResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [PermitSearchRequests]
      operationId: createPermitSearchRequest
      summary: Create a new permit search request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePermitSearchRequestBody'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermitSearchRequestResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: No verified phone number, unsupported permit type, searchType/permit mismatch, or illegal itinerary leg sequence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /permit-search-requests/{id}:
    get:
      tags: [PermitSearchRequests]
      operationId: getPermitSearchRequest
      summary: Get a permit search request by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Permit search request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermitSearchRequestResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [PermitSearchRequests]
      operationId: updatePermitSearchRequest
      summary: Update a permit search request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermitSearchRequestBody'
      responses:
        "200":
          description: Updated permit search request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermitSearchRequestResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: SearchType/permit mismatch or illegal itinerary leg sequence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [PermitSearchRequests]
      operationId: deletePermitSearchRequest
      summary: Delete a permit search request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /phone-numbers:
    get:
      tags: [PhoneNumbers]
      operationId: listPhoneNumbers
      summary: List the authenticated user's phone numbers
      responses:
        "200":
          description: List of phone numbers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PhoneNumberResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [PhoneNumbers]
      operationId: addPhoneNumber
      summary: Add a phone number and send a verification OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPhoneNumberBody'
      responses:
        "201":
          description: Phone number created and OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Phone number already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "502":
          description: Twilio Verify error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /phone-numbers/{id}/verify:
    post:
      tags: [PhoneNumbers]
      operationId: verifyPhoneNumber
      summary: Confirm the OTP code for a pending phone number
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyPhoneNumberBody'
      responses:
        "200":
          description: Phone number verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberResponse'
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Phone number not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Invalid or expired OTP, or number not in pending state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /phone-numbers/{id}:
    delete:
      tags: [PhoneNumbers]
      operationId: deletePhoneNumber
      summary: Delete a phone number
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    AuthResponse:
      type: object
      required:
        - id
        - email
        - timezone
        - verificationStatus
        - pushoverOverrideEnabled
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        timezone:
          type: string
        verificationStatus:
          $ref: '#/components/schemas/VerificationStatus'
        pushoverUserKey:
          type: string
          nullable: true
        pushoverApiToken:
          type: string
          nullable: true
        pushoverOverrideEnabled:
          type: boolean

    RegisterResponse:
      type: object
      required:
        - verificationId
        - verificationStatus
      properties:
        verificationId:
          type: string
          format: uuid
        verificationStatus:
          $ref: '#/components/schemas/VerificationStatus'

    VerificationStatus:
      type: string
      enum:
        - PENDING_VERIFICATION
        - VERIFIED

    ResendVerificationBody:
      type: object
      required:
        - email
      properties:
        email:
          type: string

    VerifyEmailBody:
      type: object
      required:
        - verificationId
        - code
      properties:
        verificationId:
          type: string
          format: uuid
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^\d{6}$'

    ForgotPasswordBody:
      type: object
      required:
        - email
      properties:
        email:
          type: string

    ResetPasswordBody:
      type: object
      required:
        - resetId
        - token
        - newPassword
      properties:
        resetId:
          type: string
          format: uuid
        token:
